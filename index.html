<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xatspace2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Cinzel', serif; }

  .scanlines {
    position:fixed; inset:0; z-index:8; pointer-events:none;
    background:repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
  }

  .vignette {
    position:fixed; inset:0; z-index:7; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.92) 100%);
  }

  /* ─── CORNER FRAMES ─── */
  .corner { position:fixed; z-index:9; pointer-events:none; width:50px; height:50px; border-color:rgba(180,40,60,0.35); border-style:solid; }
  .c-tl { top:18px; left:18px; border-width:1px 0 0 1px; }
  .c-tr { top:18px; right:18px; border-width:1px 1px 0 0; }
  .c-bl { bottom:18px; left:18px; border-width:0 0 1px 1px; }
  .c-br { bottom:18px; right:18px; border-width:0 1px 1px 0; }
  .corner-dot { position:fixed; z-index:9; pointer-events:none; width:3px; height:3px; border-radius:50%; background:rgba(200,50,70,0.5); }
  .cd-tl{top:17px;left:17px;} .cd-tr{top:17px;right:17px;} .cd-bl{bottom:17px;left:17px;} .cd-br{bottom:17px;right:17px;}

  /* ─── CANVAS (fire effect) ─── */
  #fireCanvas { position:fixed; inset:0; z-index:1; width:100%; height:100%; }

  /* ─── STARS ─── */
  #stars { position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
  .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d) ease-in-out infinite alternate; opacity:0; }
  @keyframes twinkle { 0%{opacity:0;transform:scale(0.5)} 100%{opacity:var(--op);transform:scale(1.2)} }

  /* ─── SPLASH ─── */
  #splash {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity 1s ease, transform 1s ease;
  }
  #splash.exit { opacity:0; transform:scale(1.06); pointer-events:none; }

  /* Title */
  .title-wrap { text-align:center; margin-bottom:8px; position:relative; z-index:3; }

  .title-main {
    font-family:'Cinzel', serif;
    font-size:clamp(28px, 6vw, 56px);
    font-weight:900;
    color:#ff4466;
    letter-spacing:6px;
    line-height:1;
    text-shadow:
      0 0 10px rgba(255,60,80,0.9),
      0 0 30px rgba(255,40,60,0.6),
      0 0 60px rgba(200,20,40,0.4),
      0 0 100px rgba(160,10,30,0.2);
    animation:titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%,100% { text-shadow:0 0 10px rgba(255,60,80,0.9), 0 0 30px rgba(255,40,60,0.6), 0 0 60px rgba(200,20,40,0.4); }
    50%      { text-shadow:0 0 16px rgba(255,80,100,1),  0 0 50px rgba(255,60,80,0.8),  0 0 90px rgba(200,30,50,0.6); }
  }

  .title-amp { color:rgba(255,100,120,0.4); font-weight:400; margin:0 10px; }

  .title-sub {
    font-family:'Crimson Text', serif;
    font-style:italic;
    font-size:clamp(12px,2vw,16px);
    color:rgba(220,80,100,0.4);
    letter-spacing:5px;
    margin-top:10px;
  }


  .ornament { display:flex; align-items:center; gap:14px; margin:20px 0 24px; width:min(320px,70vw); }
  .orn-line { flex:1; height:1px; background:linear-gradient(90deg, transparent, rgba(180,40,60,0.4), transparent); }
  .orn-glyph { font-size:12px; color:rgba(200,50,70,0.5); }


  .start-btn {
    position:relative;
    background:transparent;
    border:1px solid rgba(200,50,70,0.5);
    border-radius:2px;
    padding:18px 56px;
    cursor:pointer;
    font-family:'Cinzel', serif;
    font-size:13px;
    font-weight:700;
    color:#ff6070;
    letter-spacing:5px;
    text-transform:uppercase;
    outline:none;
    transition:all 0.3s;
    overflow:hidden;
    box-shadow:0 0 20px rgba(200,30,50,0.15), inset 0 0 20px rgba(160,10,30,0.08);
    text-shadow:0 0 10px rgba(255,60,80,0.5);
  }

  .start-btn::before {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(90deg, transparent 0%, rgba(220,50,70,0.12) 30%, rgba(255,70,90,0.2) 50%, rgba(220,50,70,0.12) 70%, transparent 100%);
    background-size:200% 100%;
    animation:btnShimmer 2.5s ease-in-out infinite;
  }
  @keyframes btnShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .start-btn::after { content:'◆'; position:absolute; top:5px; left:8px; font-size:8px; color:rgba(200,50,70,0.35); }

  .start-btn:hover {
    border-color:rgba(255,80,100,0.8);
    color:#ff8090;
    box-shadow:0 0 35px rgba(220,40,60,0.4), inset 0 0 30px rgba(180,20,40,0.12);
    letter-spacing:6px;
  }
  .start-btn:active { transform:scale(0.97); }
  .start-btn:disabled { opacity:0.3; cursor:default; }

  .btn-pulse {
    position:absolute; inset:-1px;
    border:1px solid rgba(220,50,70,0.25);
    border-radius:2px;
    animation:bPulse 2.5s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes bPulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:0.9;transform:scale(1.025)} }

  .hint {
    margin-top:22px;
    font-family:'Crimson Text', serif;
    font-style:italic;
    font-size:13px;
    color:rgba(200,60,80,0.3);
    letter-spacing:3px;
    animation:hBlink 3s ease-in-out infinite;
  }
  @keyframes hBlink { 0%,100%{opacity:0.3} 50%{opacity:0.9} }

  /* ─── FLASH ─── */
  #flash { position:fixed; inset:0; z-index:100; background:#0a0002; opacity:0; pointer-events:none; transition:opacity 0.25s; }
  #flash.on { opacity:1; pointer-events:all; }

  /* ─── IFRAME ─── */
  #profile-frame { position:fixed; inset:0; z-index:50; border:none; width:100%; height:100%; opacity:0; pointer-events:none; transition:opacity 0.8s ease; }
  #profile-frame.visible { opacity:1; pointer-events:all; }
</style>
</head>
<body>

<canvas id="fireCanvas"></canvas>
<div id="stars"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="corner c-tl"></div><div class="corner c-tr"></div>
<div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="corner-dot cd-tl"></div><div class="corner-dot cd-tr"></div>
<div class="corner-dot cd-bl"></div><div class="corner-dot cd-br"></div>

<div id="flash"></div>
<iframe id="profile-frame" src="" title="Profile"></iframe>

<audio id="bgm" loop>
  <source src="assets/music.mp3" type="audio/mpeg">
  <source src="assets/music.ogg" type="audio/ogg">
  <source src="assets/music.wav" type="audio/wav">
</audio>

<div id="splash">
  <div class="title-wrap">
    <div class="title-main">There's <span class="title-amp">a</span> Home</div>
    <div class="title-sub">Welcome</div>
  </div>

  <div class="ornament">
    <div class="orn-line"></div>
    <div class="orn-glyph">◈</div>
    <div class="orn-line"></div>
  </div>

  <button class="start-btn" id="startBtn" onclick="startGame()">
    <div class="btn-pulse"></div>
    ◆ &nbsp; Enter &nbsp; ◆
  </button>

  <div class="hint">— Youtopia —</div>
</div>

<script>


const canvas = document.getElementById('fireCanvas');
const ctx    = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

/* ── Colour palette matching the gif ── */
const COLORS = [
  [255, 255, 255],   // white core
  [255, 200, 210],   // pale pink
  [255, 100, 130],   // rose
  [220,  40,  70],   // crimson
  [180,  10,  30],   // deep red
  [120,   0,  20],   // dark blood
];

function randColor(bright) {
  const c = bright
    ? COLORS[Math.floor(Math.random() * 3)]      // white→pink
    : COLORS[2 + Math.floor(Math.random() * 4)]; // rose→dark
  return c;
}

/* ── Particle class ── */
class Particle {
  constructor() { this.reset(true); }

  reset(init) {
    /* Spawn in a vertical band around centre, biased low */
    this.x  = cx + (Math.random() - 0.5) * W * 0.18;
    this.y  = cy + (init ? (Math.random() - 0.5) * H * 0.6 : H * 0.25 + Math.random() * H * 0.15);
    this.vx = (Math.random() - 0.5) * 1.4;
    this.vy = -(Math.random() * 3.5 + 1.2);      // rises upward
    this.life    = 0;
    this.maxLife = Math.random() * 100 + 60;
    this.size    = Math.random() * 18 + 4;
    this.bright  = Math.random() < 0.25;
    this.color   = randColor(this.bright);
    this.wobble  = (Math.random() - 0.5) * 0.08;
    this.expand  = Math.random() < 0.5;           // some particles grow, some shrink
  }

  update() {
    this.life++;
    this.x  += this.vx + Math.sin(this.life * 0.06) * 0.7;
    this.y  += this.vy;
    this.vy *= 0.985;                              // slow deceleration
    this.vx += this.wobble;

    /* Subtle horizontal drift toward centre creating "cross" shape */
    const pull = (cx - this.x) * 0.0015;
    this.vx   += pull;

    if (this.life >= this.maxLife) this.reset(false);
  }

  draw() {
    const t    = this.life / this.maxLife;
    const alpha = t < 0.2 ? t / 0.2 : 1 - (t - 0.2) / 0.8;
    const size  = this.expand
      ? this.size * (1 + t * 0.5)
      : this.size * (1 - t * 0.3);

    const [r, g, b] = this.color;

    /* Glow (large, very soft) */
    const glowR = size * 4;
    const grd   = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    grd.addColorStop(0,   `rgba(${r},${g},${b},${alpha * 0.18})`);
    grd.addColorStop(0.4, `rgba(${r},${g},${b},${alpha * 0.06})`);
    grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    /* Core blob */
    const brd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size);
    brd.addColorStop(0,   `rgba(255,255,255,${alpha * (this.bright ? 0.95 : 0.5)})`);
    brd.addColorStop(0.3, `rgba(${r},${g},${b},${alpha * 0.85})`);
    brd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    ctx.fillStyle = brd;
    ctx.fill();
  }
}

/* ── Wing / arm streaks (mimic the horizontal "wings" in the gif) ── */
class Streak {
  constructor(side) {
    this.side = side; // -1 left, 1 right
    this.reset();
  }
  reset() {
    this.x    = cx + this.side * (W * 0.04 + Math.random() * W * 0.12);
    this.y    = cy + (Math.random() - 0.5) * H * 0.22;
    this.vx   = this.side * (Math.random() * 3 + 1.5);
    this.vy   = (Math.random() - 0.5) * 1.2 - 0.6;
    this.life = 0;
    this.maxLife = Math.random() * 50 + 30;
    this.size = Math.random() * 10 + 3;
    this.color = randColor(Math.random() < 0.3);
  }
  update() {
    this.life++;
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.96;
    if (this.life >= this.maxLife) this.reset();
  }
  draw() {
    const t     = this.life / this.maxLife;
    const alpha = t < 0.15 ? t / 0.15 : 1 - (t - 0.15) / 0.85;
    const sz    = this.size * (1 - t * 0.5);
    const [r,g,b] = this.color;
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, sz * 3.5);
    grd.addColorStop(0,   `rgba(${r},${g},${b},${alpha * 0.7})`);
    grd.addColorStop(0.5, `rgba(${r},${g},${b},${alpha * 0.2})`);
    grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, sz * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }
}

/* ── Ground sparks (bottom lightning effect) ── */
class Spark {
  constructor() { this.reset(); }
  reset() {
    this.x    = cx + (Math.random() - 0.5) * W * 0.35;
    this.y    = cy + H * 0.18 + Math.random() * H * 0.08;
    this.vx   = (Math.random() - 0.5) * 4;
    this.vy   = Math.random() * -2.5 - 0.5;
    this.life = 0;
    this.maxLife = Math.random() * 30 + 15;
    this.size = Math.random() * 3 + 1;
  }
  update() { this.life++; this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; if(this.life>=this.maxLife)this.reset(); }
  draw() {
    const t=this.life/this.maxLife;
    const a=t<0.2?t/0.2:1-(t-0.2)/0.8;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*(1-t*0.7),0,Math.PI*2);
    ctx.fillStyle=`rgba(255,${Math.floor(150+Math.random()*100)},180,${a*0.9})`;
    ctx.fill();
  }
}

/* ── Smoke wisps (top) ── */
class Wisp {
  constructor() { this.reset(true); }
  reset(init) {
    this.x    = cx + (Math.random()-0.5)*W*0.25;
    this.y    = init ? cy - Math.random()*H*0.4 : cy - H*0.1;
    this.vx   = (Math.random()-0.5)*0.8;
    this.vy   = -(Math.random()*1.2+0.4);
    this.life = 0;
    this.maxLife = Math.random()*120+80;
    this.size = Math.random()*40+20;
  }
  update() { this.life++; this.x+=this.vx+Math.sin(this.life*0.03)*0.5; this.y+=this.vy; this.vy*=0.992; if(this.life>=this.maxLife)this.reset(false); }
  draw() {
    const t=this.life/this.maxLife;
    const a=t<0.1?t/0.1:(1-(t-0.1)/0.9)*0.12;
    const sz=this.size*(1+t*0.8);
    const grd=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,sz);
    grd.addColorStop(0,`rgba(180,20,40,${a})`);
    grd.addColorStop(1,`rgba(80,0,10,0)`);
    ctx.beginPath(); ctx.arc(this.x,this.y,sz,0,Math.PI*2);
    ctx.fillStyle=grd; ctx.fill();
  }
}

/* ── Instantiate pools ── */
const PARTICLE_COUNT = 160;
const STREAK_COUNT   = 40;
const SPARK_COUNT    = 60;
const WISP_COUNT     = 18;

const particles = Array.from({length: PARTICLE_COUNT}, () => new Particle());
const streaks   = Array.from({length: STREAK_COUNT},   () => { const s=new Streak(Math.random()<0.5?-1:1); s.life=Math.floor(Math.random()*s.maxLife); return s; });
const sparks    = Array.from({length: SPARK_COUNT},    () => { const s=new Spark(); s.life=Math.floor(Math.random()*s.maxLife); return s; });
const wisps     = Array.from({length: WISP_COUNT},     () => new Wisp());

/* ── Central orb pulse ── */
let orbPhase = 0;

function drawOrb() {
  orbPhase += 0.035;
  const pulse  = 0.85 + Math.sin(orbPhase) * 0.15;
  const radius = Math.min(W, H) * 0.09 * pulse;

  /* Deep red outer haze */
  const haze = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 5);
  haze.addColorStop(0,   `rgba(200, 20, 40, 0.12)`);
  haze.addColorStop(0.4, `rgba(160, 10, 25, 0.06)`);
  haze.addColorStop(1,   `rgba(100,  5, 15, 0)`);
  ctx.beginPath(); ctx.arc(cx, cy, radius*5, 0, Math.PI*2);
  ctx.fillStyle = haze; ctx.fill();

  /* Bright core */
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  core.addColorStop(0,    `rgba(255,255,255, 0.95)`);
  core.addColorStop(0.25, `rgba(255,180,190, 0.7)`);
  core.addColorStop(0.6,  `rgba(220, 40, 60, 0.4)`);
  core.addColorStop(1,    `rgba(160, 10, 20, 0)`);
  ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2);
  ctx.fillStyle = core; ctx.fill();
}

/* ── Main loop ── */
let frame = 0;
function loop() {
  requestAnimationFrame(loop);
  frame++;

  /* Trail fade — dark red overlay instead of black for ember feel */
  ctx.fillStyle = 'rgba(4, 0, 2, 0.38)';
  ctx.fillRect(0, 0, W, H);

  /* Draw layers back→front */
  wisps.forEach(w => { w.update(); w.draw(); });
  streaks.forEach(s => { s.update(); s.draw(); });
  particles.forEach(p => { p.update(); p.draw(); });
  sparks.forEach(s => { s.update(); s.draw(); });
  drawOrb();
}
loop();

/* ── Stars ── */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random()*1.4+0.3;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(2)}s;--op:${(Math.random()*0.3+0.04).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(2)}s;`;
  starsEl.appendChild(s);
}

/* ── Start ── */
function startGame() {
  const bgm=document.getElementById('bgm');
  const btn=document.getElementById('startBtn');
  const splash=document.getElementById('splash');
  const flash=document.getElementById('flash');
  const iframe=document.getElementById('profile-frame');
  btn.disabled=true;
  bgm.volume=0;
  bgm.play().catch(()=>{});
  let vol=0;
  const fi=setInterval(()=>{ vol=Math.min(vol+0.03,0.8); bgm.volume=vol; if(vol>=0.8)clearInterval(fi); },100);
  setTimeout(()=>{
    splash.classList.add('exit');
    setTimeout(()=>{
      flash.classList.add('on');
      setTimeout(()=>{ iframe.src='pokemon_profile.html'; iframe.classList.add('visible'); setTimeout(()=>flash.classList.remove('on'),200); },220);
    },800);
  },350);
}

document.addEventListener('keydown', e=>{
  if((e.code==='Enter'||e.code==='Space')&&!document.getElementById('startBtn').disabled){
    e.preventDefault(); startGame();
  }
});
</script>
</body>
</html>
