<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    font-family: 'Crimson Text', serif;
    background: #060a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(20,48,80,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(20,48,80,0.2) 0%, transparent 50%);
  }
 
  /* Particle dust */
  .dust { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .mote {
    position: absolute;
    width: 1px; height: 1px;
    background: rgba(100,156,220,0.6);
    border-radius: 50%;
    animation: floatMote var(--d) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes floatMote {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    30%  { opacity: 1; }
    70%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
  }
 
  .card {
    position: relative;
    z-index: 1;
    width: 800px;
    background: linear-gradient(160deg, #0e151e 0%, #0a1016 60%, #090e14 100%);
    border-radius: 4px;
    border: 1px solid rgba(60,116,180,0.4);
    box-shadow:
      0 0 0 1px rgba(20,39,60,0.8),
      0 0 40px rgba(40,96,160,0.15),
      0 20px 60px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(100,156,220,0.1);
    display: flex;
    overflow: hidden;
    min-height: 400px;
  }
 
  /* Corner ornaments */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: rgba(70,131,200,0.5);
    border-style: solid;
    z-index: 10;
  }
  .card::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
 
  /* Top shimmer line */
  .card-shimmer {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(80,155,240,0.6), rgba(80,145,220,0.4), transparent);
    background-size: 200% 100%;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
 
  /* Header */
  .header-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(90deg, #08121e 0%, #0c131c 100%);
    border-bottom: 1px solid rgba(50,101,160,0.3);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    z-index: 10;
  }
 
  .header-rune {
    font-size: 14px;
    opacity: 0.6;
    color: #608dc0;
  }
 
  .header-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    color: rgba(130,181,240,0.7);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
 
  .header-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(50,101,160,0.3), transparent);
  }
 
  .header-glyph {
    font-size: 10px;
    color: rgba(70,121,180,0.4);
    letter-spacing: 2px;
  }
 
  /* LEFT PANEL */
  .left-panel {
    width: 270px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px 24px;
    position: relative;
    border-right: 1px solid rgba(40,77,120,0.3);
    background: linear-gradient(180deg, rgba(10,22,35,0.6) 0%, rgba(6,13,20,0.4) 100%);
  }
 
  /* Subtle bg pattern */
  .left-panel::before {
    content: '';
    position: absolute;
    inset: 40px 0 0 0;
    background-image:
      radial-gradient(circle at 50% 30%, rgba(30,72,120,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
 
  /* Avatar */
  .avatar-area {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: #080c10;
    border: 1px solid rgba(60,116,180,0.5);
    box-shadow:
      0 0 0 3px rgba(8,14,20,0.8),
      0 0 0 4px rgba(40,77,120,0.3),
      0 0 20px rgba(40,96,160,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    z-index: 2;
    margin-top: 8px;
  }
 
  .avatar-area img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
 
  /* Rotating ring on avatar */
  .avatar-ring {
    position: absolute;
    width: 168px; height: 168px;
    border-radius: 50%;
    border: 1px solid rgba(60,116,180,0.2);
    border-top-color: rgba(80,155,240,0.5);
    border-right-color: rgba(40,96,160,0.3);
    animation: spin 12s linear infinite;
    z-index: 3;
    pointer-events: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
 
  /* Player badge */
  .player-badge {
    position: relative;
    z-index: 2;
    margin-top: 14px;
    background: linear-gradient(135deg, #081320 0%, #060e18 100%);
    border-radius: 3px;
    padding: 10px 24px;
    text-align: center;
    border: 1px solid rgba(50,101,160,0.4);
    min-width: 170px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(70,131,200,0.1);
  }
 
  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    color: #b8d2f0;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(80,155,240,0.4);
  }
 
  .player-id {
    font-family: 'Crimson Text', serif;
    font-size: 12px;
    color: rgba(100,147,200,0.5);
    margin-top: 3px;
    letter-spacing: 1px;
  }
 
  /* Friends button */
  .friends-btn {
    position: relative;
    z-index: 2;
    margin-top: 14px;
    background: linear-gradient(135deg, #081320 0%, #060f1a 100%);
    border: 1px solid rgba(50,101,160,0.4);
    border-radius: 3px;
    padding: 8px 20px;
    color: rgba(130,181,240,0.8);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.25s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
 
  .friends-btn:hover {
    border-color: rgba(80,155,240,0.6);
    color: #a0c5f0;
    box-shadow: 0 0 12px rgba(40,96,160,0.2);
  }
 
  .friends-btn.open {
    border-color: rgba(80,155,240,0.6);
    color: #a0c5f0;
    box-shadow: 0 0 14px rgba(40,96,160,0.25);
  }

  .friends-btn svg { width: 14px; height: 14px; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .friends-btn.open svg.chevron { transform: rotate(180deg); }
 
  /* Friends list */
  .friends-list {
    position: relative;
    z-index: 2;
    width: 220px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease;
    opacity: 0;
    margin-top: 6px;
  }
 
  .friends-list.open { opacity: 1; }
  .friends-list.closing { opacity: 0; transition: max-height 0.4s cubic-bezier(0.4, 0, 1, 1), opacity 0.3s ease 0.05s; }
 
  .friends-inner {
    background: rgba(5,10,16,0.95);
    border-radius: 3px;
    border: 1px solid rgba(40,77,120,0.4);
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    overflow: hidden;
    transform: translateY(-4px) scale(0.98);
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
  }

  .friends-list.open .friends-inner {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .friends-list.closing .friends-inner {
    transform: translateY(-4px) scale(0.97);
    opacity: 0;
    transition: transform 0.35s cubic-bezier(0.4, 0, 1, 1), opacity 0.28s ease;
  }

  /* Glow sweep across the panel on open */
  .friends-inner::before {
    content: '';
    position: absolute;
    top: 0; left: -60%;
    width: 60%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(80,155,240,0.18), transparent);
    pointer-events: none;
    z-index: 1;
  }

  .friends-list.open .friends-inner::before {
    animation: panelSweep 0.9s ease-out 0.05s;
  }

  @keyframes panelSweep {
    from { left: -60%; }
    to   { left: 120%; }
  }
 
  .friend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 2px;
    background: rgba(10,22,35,0.8);
    border: 1px solid rgba(30,63,100,0.3);
    animation: friendReveal 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(-8px) scale(0.94);
    filter: blur(2px);
    position: relative;
    z-index: 2;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
  }

  .friend-item:hover {
    border-color: rgba(70,131,200,0.55);
    background: rgba(15,31,50,0.9);
    box-shadow: 0 0 14px rgba(40,96,160,0.18);
  }

  @keyframes friendReveal {
    0%   { opacity: 0; transform: translateY(-8px) scale(0.94); filter: blur(2px); }
    60%  { opacity: 1; transform: translateY(1px) scale(1.015); filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  .friends-list.closing .friend-item {
    animation: friendHide 0.28s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  @keyframes friendHide {
    from { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    to   { opacity: 0; transform: translateY(-6px) scale(0.95); filter: blur(2px); }
  }
 
  .friend-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    border: 1px solid rgba(50,101,160,0.4);
    background: rgba(10,29,50,0.9);
    color: #a0c2e8;
  }
 
  .friend-info { flex: 1; min-width: 0; }
 
  .friend-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: #a0c2e8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
 
  .friend-status {
    font-size: 11px;
    color: rgba(100,137,180,0.5);
    font-style: italic;
  }
 
  .friend-online {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 4px currentColor;
  }
  .online-dot  { background: #3a8eed; color: #3a8eed; }
  .offline-dot { background: #1e2e40; color: #1e2e40; box-shadow: none; }
 
  /* RIGHT PANEL */
  .right-panel {
    flex: 1;
    padding: 52px 26px 22px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
 
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    color: rgba(100,156,220,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2px;
  }
 
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(50,101,160,0.4), transparent);
  }
 
  /* Data rows — fixed, no inputs */
  .data-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(10,17,26,0.7);
    border-radius: 2px;
    padding: 9px 14px;
    border: 1px solid rgba(30,63,100,0.3);
    border-left: 2px solid rgba(50,101,160,0.4);
  }
 
  .data-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    color: rgba(90,141,200,0.55);
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 88px;
    flex-shrink: 0;
  }
 
  .data-value {
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    color: #b0cae8;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
 
  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 2px;
  }
 
  .stat-box {
    background: rgba(10,17,26,0.7);
    border-radius: 2px;
    border: 1px solid rgba(30,63,100,0.3);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }
 
  .stat-box::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px; height: 100%;
    background: linear-gradient(180deg, rgba(60,125,200,0.6), transparent);
  }
 
  .stat-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    color: rgba(90,141,200,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
 
  .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: #b8d2f0;
    text-shadow: 0 0 10px rgba(80,155,240,0.3);
    line-height: 1;
  }
 
  .stat-fraction {
    font-size: 13px;
    color: rgba(100,156,220,0.5);
    font-weight: 400;
  }
 
  .stat-badge {
    display: inline-block;
    font-size: 11px;
    margin-right: 4px;
    opacity: 0.7;
  }

  /* ── Dedicatoria modal ── */
  #dedi-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,6,10,0.72);
    backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
  }
  #dedi-overlay.show {
    opacity: 1;
    visibility: visible;
  }

  #dedi-modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%) scale(0.96);
    width: min(480px, 90vw);
    max-height: min(620px, 82vh);
    background: linear-gradient(160deg, #0e151e 0%, #0a1016 60%, #090e14 100%);
    border: 1px solid rgba(60,116,180,0.4);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(20,39,60,0.8),
      0 0 50px rgba(40,96,160,0.2),
      0 25px 70px rgba(0,0,0,0.85),
      inset 0 1px 0 rgba(100,156,220,0.1);
    z-index: 201;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.22,1,0.36,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #dedi-modal.show {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
  }

  #dedi-modal::before, #dedi-modal::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: rgba(70,131,200,0.5);
    border-style: solid;
    z-index: 10;
    pointer-events: none;
  }
  #dedi-modal::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
  #dedi-modal::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

  .dedi-shimmer {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(80,155,240,0.6), rgba(80,145,220,0.4), transparent);
    background-size: 200% 100%;
    animation: shimmer 4s linear infinite;
  }

  .dedi-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 22px 24px 16px;
    border-bottom: 1px solid rgba(40,77,120,0.3);
    flex-shrink: 0;
  }

  .dedi-avatar-frame {
    position: relative;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #080c10;
    border: 1px solid rgba(60,116,180,0.5);
    box-shadow:
      0 0 0 3px rgba(8,14,20,0.8),
      0 0 0 4px rgba(40,77,120,0.3),
      0 0 16px rgba(40,96,160,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .dedi-avatar-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .dedi-avatar-frame .dedi-fallback {
    display: none;
    align-items: center;
    justify-content: center;
    width: 100%; height: 100%;
    color: rgba(130,181,240,0.5);
    font-size: 22px;
  }

  .dedi-id {
    min-width: 0;
    flex: 1;
  }

  .dedi-name {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 700;
    color: #b8d2f0;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(80,155,240,0.4);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dedi-alias {
    font-family: 'Crimson Text', serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(100,156,220,0.6);
    letter-spacing: 0.5px;
    margin-top: 3px;
  }

  .dedi-close {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(50,101,160,0.4);
    background: rgba(10,22,35,0.8);
    color: rgba(130,181,240,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .dedi-close:hover {
    border-color: rgba(80,155,240,0.7);
    color: #a0c5f0;
    box-shadow: 0 0 10px rgba(40,96,160,0.25);
  }
  .dedi-close svg { width: 13px; height: 13px; }

  .dedi-body {
    padding: 18px 24px 24px;
    overflow-y: auto;
    flex: 1;
  }

  .dedi-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    color: rgba(90,141,200,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dedi-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(50,101,160,0.4), transparent);
  }

  #dedi-text {
    font-family: 'Crimson Text', serif;
    font-size: 15px;
    line-height: 1.65;
    color: #b0cae8;
    letter-spacing: 0.2px;
    white-space: pre-wrap;
  }

  /* Blinking cursor while typing */
  #dedi-text::after {
    content: '';
    display: inline-block;
    width: 2px;
    height: 1em;
    margin-left: 2px;
    background: rgba(80,155,240,0.7);
    vertical-align: text-bottom;
    animation: dediCursor 0.9s steps(1) infinite;
  }
  @keyframes dediCursor {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @media (max-width: 540px) {
    #dedi-modal { width: 92vw; height: 78vh; }
    .dedi-header { padding: 18px 18px 14px; }
    .dedi-body { padding: 14px 18px 20px; }
  }
</style>
</head>
<body>
 
<!-- Dust particles -->
<div class="dust" id="dust"></div>

<!-- Dedicatoria modal (overlay) -->
<div id="dedi-overlay" onclick="closeDedicatoria()"></div>
<div id="dedi-modal" role="dialog" aria-modal="true" aria-labelledby="dedi-name">
  <div class="dedi-shimmer"></div>
  <div class="dedi-header">
    <div class="dedi-avatar-frame">
      <img id="dedi-avatar" src="" alt="">
      <div class="dedi-fallback" id="dedi-avatar-fallback">⬡</div>
    </div>
    <div class="dedi-id">
      <div class="dedi-name" id="dedi-name"></div>
      <div class="dedi-alias" id="dedi-alias"></div>
    </div>
    <div class="dedi-close" onclick="closeDedicatoria()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
  </div>
  <div class="dedi-body">
    <div class="dedi-label">Dedicatoria</div>
    <div id="dedi-text"></div>
  </div>
</div>

<div class="card">
  <div class="card-shimmer"></div>
 
  <!-- Header -->
  <div class="header-bar">
    <span class="header-rune">⬡</span>
    <span class="header-title">Profile</span>
    <div class="header-line"></div>
    <span class="header-glyph">◈ ◈ ◈</span>
  </div>
 
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="avatar-ring"></div>
 
    <div class="avatar-area">

<script>
const FRIENDS = [
  { name: "Danibanmode",  status: "Mi bebote",     online: true ,avatar:'assets/friends/1.png', dedi: 0  },
  { name: "IMissRight",   status: "Amigovia",  online: true,avatar:'assets/friends/2.png', dedi: 1   },
  { name: "Neaxgear",   status: "Pana de tertulias",   online: true ,avatar:'assets/friends/3.png', dedi: 2 },
  // { name: "Geeta",   status: "Top de la Liga",       online: true  },
  // { name: "Tulip",   status: "Gym Leader",           online: false },
];

/* ── Dedicatorias (friends.json) ── */
let dedicatorias = [];
fetch('friends.json')
  .then(r => r.json())
  .then(data => { dedicatorias = data; })
  .catch(() => { dedicatorias = []; });

let currentDediIndex = null;

function openDedicatoria(index) {
  const friend = dedicatorias[index];
  if (!friend) return;

  /* Toggle off if same friend clicked again */
  if (currentDediIndex === index) {
    closeDedicatoria();
    return;
  }
  currentDediIndex = index;

  const overlay = document.getElementById('dedi-overlay');
  const modal = document.getElementById('dedi-modal');
  const avatarImg = document.getElementById('dedi-avatar');
  const fallback = document.getElementById('dedi-avatar-fallback');
  const nameEl = document.getElementById('dedi-name');
  const aliasEl = document.getElementById('dedi-alias');
  const textEl = document.getElementById('dedi-text');

  avatarImg.style.display = '';
  fallback.style.display = 'none';
  avatarImg.src = friend.avatar || '';
  avatarImg.onerror = function() {
    this.style.display = 'none';
    fallback.style.display = 'flex';
  };

  nameEl.textContent = friend.nombre || '';
  aliasEl.textContent = friend.alias || '';

  const full = friend.dedicatoria || '';

  /* Reserve the final size before typing, so the modal doesn't grow as text appears */
  textEl.style.minHeight = '';
  textEl.textContent = full;
  const finalHeight = textEl.scrollHeight;
  textEl.style.minHeight = finalHeight + 'px';
  textEl.textContent = '';

  overlay.classList.add('show');
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';

  /* Typewriter effect for the dedicatoria */
  let charIndex = 0;
  clearInterval(window.__dediTyper);
  window.__dediTyper = setInterval(() => {
    if (charIndex >= full.length || currentDediIndex !== index) {
      clearInterval(window.__dediTyper);
      return;
    }
    textEl.textContent += full.charAt(charIndex);
    charIndex++;
  }, 18);
}

function closeDedicatoria() {
  const overlay = document.getElementById('dedi-overlay');
  const modal = document.getElementById('dedi-modal');
  overlay.classList.remove('show');
  modal.classList.remove('show');
  document.body.style.overflow = '';
  currentDediIndex = null;
  clearInterval(window.__dediTyper);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && currentDediIndex !== null) closeDedicatoria();
});
 
let open = false;
 
function toggleFriends() {
  open = !open;
  const list = document.getElementById('friends-list');
  const btn  = document.getElementById('friends-btn');
  const inner = document.getElementById('friends-inner');

  if (open) {
    list.classList.remove('closing');
    inner.innerHTML = '';
    FRIENDS.forEach((f, i) => {
      const el = document.createElement('div');
      el.className = 'friend-item';
      el.style.animationDelay = (i * 65) + 'ms';
      el.style.cursor = 'pointer';
      el.innerHTML = `
        <img class="friend-avatar" src="${f.avatar}" alt="${f.name}">
        <div class="friend-info">
          <div class="friend-name">${f.name}</div>
          <div class="friend-status">${f.status}</div>
        </div>
        <div class="friend-online ${f.online ? 'online-dot' : 'offline-dot'}"></div>
      `;
      el.addEventListener('click', () => openDedicatoria(f.dedi));
      inner.appendChild(el);
    });

    /* Measure the natural height of the panel and expand to exactly that */
    list.style.maxHeight = inner.scrollHeight + 'px';
    list.classList.add('open');
    btn.classList.add('open');
  } else {
    /* Lock current height, then collapse smoothly with a fade-out of items */
    list.style.maxHeight = inner.scrollHeight + 'px';
    list.classList.remove('open');
    list.classList.add('closing');
    btn.classList.remove('open');

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        list.style.maxHeight = '0px';
      });
    });

    setTimeout(() => {
      list.classList.remove('closing');
      inner.innerHTML = '';
    }, 380);
  }
}
 
/* Dust particles */
const dust = document.getElementById('dust');
for (let i = 0; i < 30; i++) {
  const m = document.createElement('div');
  m.className = 'mote';
  m.style.cssText = `
    left:${Math.random()*100}%;
    bottom:${Math.random()*40}%;
    --d:${(Math.random()*6+4).toFixed(1)}s;
    animation-delay:${(Math.random()*8).toFixed(1)}s;
    width:${Math.random()<0.3?2:1}px;
    height:${Math.random()<0.3?2:1}px;
  `;
  dust.appendChild(m);
}
 
/* ── Music widget: read song name from parent if loaded via iframe ── */
(function() {
  let songName = 'Desconocida';
  try {
    const parentAudio = window.parent.document.getElementById('bgm');
    if (parentAudio) {
      const src = parentAudio.currentSrc || parentAudio.querySelector('source')?.src || '';
      const file = src.split('/').pop().split('?')[0];
      if (file) songName = decodeURIComponent(file.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '));
    }
  } catch(e) {}
  document.getElementById('nw-title').textContent = songName || 'Desconocida';
})();
</script>

  }
 
  /* Animated equaliser bars */
  .nw-bars {
    display: flex;
    align-items: flex-end;
    gap: 1.5px;
    height: 9px;
  }
 
  .nw-bar {
    width: 2px;
    border-radius: 1px;
    background: rgba(80,145,220,0.7);
    animation: barBounce var(--s) ease-in-out infinite alternate;
  }
 
  @keyframes barBounce {
    from { height: 2px; opacity: 0.4; }
    to   { height: var(--h); opacity: 1; }
  }
 
  .nw-song {
    font-family: 'Crimson Text', serif;
    font-size: 13px;
    font-weight: 600;
    color: #b0cae8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.3px;
  }
 
  /* Scrolling text if too long */
  .nw-song.scroll {
    animation: nwScroll 8s linear infinite;
    white-space: nowrap;
  }
  @keyframes nwScroll {
    0%,15%  { transform: translateX(0); }
    85%,100%{ transform: translateX(var(--scroll-dist)); }
  }
</style>

<script>
/* Scroll song title if it overflows */
(function() {
  const song = document.getElementById('nw-title');
  const parent = song.parentElement;
  setTimeout(() => {
    if (song.scrollWidth > parent.offsetWidth + 4) {
      const dist = -(song.scrollWidth - parent.offsetWidth + 8);
      song.style.setProperty('--scroll-dist', dist + 'px');
      song.classList.add('scroll');
    }
  }, 800);
})();
</script>
